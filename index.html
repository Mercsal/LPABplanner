<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPAB Elective Planner</title>
    <link rel="stylesheet" href="./css/planner.css">
</head>
<body>

    <aside id="subject-pool">
        <h2>Available Subjects</h2>
        <div id="subject-list"></div>
    </aside>

    <main id="planner-board">
        <section id="progress-tracker">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h2 style="margin: 0 0 10px 0;">Diploma Progress</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
                    <button id="export-btn" class="toolbar-btn btn-export">Copy to Text</button>
                    <button onclick="window.print()" class="toolbar-btn btn-print">Print Plan</button>
                </div>
            </div>
            <div class="progress-row">
                <div style="display: flex; justify-content: space-between;">
                    <span>Compulsory Subjects</span><span id="compulsory-text">0 / 17</span>
                </div>
                <div class="progress-bar-bg"><div id="compulsory-bar" class="progress-bar-fill" style="width: 0%;"></div></div>
            </div>
            <div class="progress-row">
                <div style="display: flex; justify-content: space-between;">
                    <span>Elective Subjects</span><span id="elective-text">0 / 3</span>
                </div>
                <div class="progress-bar-bg"><div id="elective-bar" class="progress-bar-fill elective-fill" style="width: 0%;"></div></div>
            </div>
            <div id="grad-status">Status: Planning...</div>
        </section>

        <div id="feedback-panel" class="error"><ul id="error-list"></ul></div>

        <section class="semester-card" id="completed-section">
            <h2>Already Completed</h2>
            <div class="semester-slots" id="completed-slots" style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));"></div>
        </section>

        <div id="dynamic-semesters" style="display: flex; flex-direction: column; gap: 20px;"></div>
    </main>

    <script type="module" src="./js/ui/ui-main.js"></script>
    <script>
        // Dark mode toggle — runs before modules load to avoid flash
        (function () {
            const html   = document.documentElement;
            const toggle = document.getElementById('theme-toggle');

            // Default to system preference
            let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');

            toggle.addEventListener('click', () => {
                theme = theme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', theme);
                toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
                toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            });
        })();
    </script>
</body>
</html>
