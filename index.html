<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPAB Elective Planner</title>
    <link rel="stylesheet" href="./css/planner.css">
</head>
<body>

    <!-- ─── Onboarding overlay ─────────────────────────────────────────── -->
    <div id="onboarding-overlay" role="dialog" aria-modal="true" aria-labelledby="onboarding-title" style="display:none;">
        <div class="onboarding-modal">

            <button id="onboarding-close" class="onboarding-close" aria-label="Close onboarding">&times;</button>

            <h2 id="onboarding-title" class="onboarding-modal__title"></h2>

            <div id="onboarding-tiles" class="onboarding-tiles"></div>

            <div class="onboarding-footer">
                <div class="onboarding-dots">
                    <span class="onboarding-dot"></span>
                    <span class="onboarding-dot"></span>
                    <span class="onboarding-dot"></span>
                </div>
                <div class="onboarding-footer__actions">
                    <button id="onboarding-back" class="toolbar-btn btn-print onboarding-btn">Back</button>
                    <button id="onboarding-next" class="toolbar-btn btn-export onboarding-btn">Next</button>
                </div>
            </div>

        </div>
    </div>
    <!-- ─── End onboarding overlay ──────────────────────────────────────── -->

    <aside id="subject-pool">
        <h2>Available Subjects</h2>
        <div id="subject-list"></div>
    </aside>

    <main id="planner-board">
        <section id="progress-tracker">
            <div class="progress-header">
                <h2 class="progress-header__title">Diploma Progress</h2>
                <div class="progress-toolbar">
                    <button id="theme-toggle" aria-label="Switch to dark mode">&#9790;</button>
                    <button id="reset-btn"    class="toolbar-btn btn-reset">Reset Plan</button>
                    <button id="export-btn"   class="toolbar-btn btn-export">Copy to Text</button>
                    <button id="help-btn"     class="toolbar-btn btn-print">Help / Tour</button>
                    <button onclick="window.print()" class="toolbar-btn btn-print">Print Plan</button>
                </div>
            </div>
            <div class="progress-row">
                <div class="progress-row__label">
                    <span>Compulsory Subjects</span><span id="compulsory-text">0 / 17</span>
                </div>
                <div class="progress-bar-bg"><div id="compulsory-bar" class="progress-bar-fill" style="width: 0%;"></div></div>
            </div>
            <div class="progress-row">
                <div class="progress-row__label">
                    <span>Elective Subjects</span><span id="elective-text">0 / 3</span>
                </div>
                <div class="progress-bar-bg"><div id="elective-bar" class="progress-bar-fill elective-fill" style="width: 0%;"></div></div>
            </div>
            <div id="grad-status">Status: Planning...</div>
        </section>

        <div id="feedback-panel" class="error"><ul id="error-list"></ul></div>

        <section class="semester-card" id="completed-section">
            <h2>Already Completed</h2>
            <div class="semester-slots" id="completed-slots"></div>
        </section>

        <div id="dynamic-semesters"></div>
    </main>

    <script type="module" src="./js/ui/ui-main.js"></script>
    <script>
        (function () {
            const html   = document.documentElement;
            const toggle = document.getElementById('theme-toggle');

            let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            toggle.innerHTML = theme === 'dark' ? '&#9728;' : '&#9790;';
            toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            toggle.addEventListener('click', () => {
                theme = theme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', theme);
                toggle.innerHTML = theme === 'dark' ? '&#9728;' : '&#9790;';
                toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            });
        })();
    </script>
</body>
</html>
